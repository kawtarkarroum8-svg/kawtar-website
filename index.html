                <li>إدارة المستودعات البرمجية عبر Git & GitHub.</li>

                <button type="submit" id="btn-submit" class="btn-submit">إرسال الرسالة</button>
            </form>
        </div>

        <footer class="social-links">

            <a href="#" target="_blank" class="social-btn">🌐 GitHub</a>

        </footer>
